<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        /* Style for the success message state */
        .success-content {
            display: none; /* Hidden by default */
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div id="registration-section">
        <h2 class="text-center mb-4">Create Account</h2>
        <form class="row g-3 needs-validation" id="registrationForm" novalidate>
            
            <div class="col-md-12">
                <label for="validationName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="validationName" placeholder="Enter your name" required>
                <div class="invalid-feedback">Please enter your full name.</div>
            </div>

            <div class="col-md-6">
                <label for="validationEmail" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="validationEmail" placeholder="name@example.com" required>
                <div class="invalid-feedback">Please provide a valid email.</div>
            </div>

            <div class="col-md-6">
                <label for="validationRole" class="form-label">Account Type</label>
                <select class="form-select" id="validationRole" required>
                    <option selected disabled value="">Choose...</option>
                    <option>Personal</option>
                    <option>Business</option>
                    <option>Educational</option>
                </select>
                <div class="invalid-feedback">Please select an account type.</div>
            </div>

            <div class="col-md-12">
                <label for="validationPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="validationPassword" minlength="8" required>
                <div class="form-text">Must be at least 8 characters.</div>
                <div class="invalid-feedback">Password is too short.</div>
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                    <label class="form-check-label" for="invalidCheck">
                        I agree to the terms and conditions
                    </label>
                    <div class="invalid-feedback">You must agree before submitting.</div>
                </div>
            </div>

            <div class="col-12 mt-4">
                <button class="btn btn-primary w-100" type="submit">Register Now</button>
            </div>
        </form>
    </div>

    <div id="success-section" class="success-content">
        <h1 class="display-4">🥳</h1>
        <h2 class="text-success mt-3">Success!</h2>
        <p class="lead">Your account is created successfully.</p>
        <button class="btn btn-outline-primary mt-3" onclick="location.reload()">Create Another Account</button>
    </div>
</div>

<script>
    (() => {
      'use strict'
      const form = document.getElementById('registrationForm');
      const regSection = document.getElementById('registration-section');
      const successSection = document.getElementById('success-section');

      form.addEventListener('submit', event => {
        // Prevent default submission behavior (reloading the page)
        event.preventDefault();
        event.stopPropagation();

        if (form.checkValidity()) {
          // If the form is valid, switch "pages"
          regSection.style.display = 'none';
          successSection.style.display = 'block';

          // NOTE: If you wanted to move to a physical second file named 'success.html',
          // you would use the code below instead of the lines above:
          // window.location.href = 'success.html';
        }

        form.classList.add('was-validated');
      }, false);
    })()
</script>

</body>
</html>
